<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凱沁老師課程報名查詢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1208;
    --paper: #faf7f2;
    --warm: #f5efe4;
    --gold: #b8860b;
    --gold-light: #d4a843;
    --sage: #5a7a5e;
    --sage-light: #7a9e7e;
    --rust: #9b4a2e;
    --muted: #8a7a6a;
    --border: #ddd0ba;
    --waitlist-bg: #fff8e6;
    --waitlist-border: #e8c84a;
    --success-bg: #f0f7f1;
    --success-border: #5a7a5e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  .header {
    background: var(--ink);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(184,134,11,0.04) 20px,
      rgba(184,134,11,0.04) 21px
    );
  }
  .header-inner { position: relative; z-index: 1; }
  .header-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 300;
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 30px);
    color: #fff;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1.3;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }
  .gold-line {
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 16px auto 0;
  }

  /* Data source badge */
  .source-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 20px auto 0;
    padding: 8px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    width: fit-content;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }
  .source-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #5a7a5e;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Search section */
  .search-section {
    max-width: 520px;
    margin: 32px auto 0;
    padding: 0 20px;
  }
  .search-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .search-row {
    display: flex;
    gap: 10px;
  }
  .search-input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 18px;
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
  }
  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
  }
  .search-input::placeholder { color: #c4b8a8; }

  .search-btn {
    padding: 14px 22px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .search-btn:hover { background: #333; }
  .search-btn:active { transform: scale(0.97); }

  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* Results */
  .results {
    max-width: 520px;
    margin: 28px auto 0;
    padding: 0 20px;
  }

  .person-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .person-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .person-name-block {}
  .person-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }
  .person-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .course-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .course-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .course-card.waitlist {
    border-color: var(--waitlist-border);
    background: var(--waitlist-bg);
  }
  .course-card.confirmed {
    border-color: var(--success-border);
    background: var(--success-bg);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .course-title-block {}
  .course-type {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 4px;
  }
  .course-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .seq-badge {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .seq-badge.normal {
    background: var(--ink);
    color: #fff;
  }
  .seq-badge.waitlist {
    background: var(--waitlist-border);
    color: #5a4000;
  }

  .card-date {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .card-date svg { flex-shrink: 0; opacity: 0.5; }

  .card-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 14px;
    opacity: 0.6;
  }
  .course-card.waitlist .card-divider { background: var(--waitlist-border); }
  .course-card.confirmed .card-divider { background: var(--success-border); }

  .card-status-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .status-pill.green {
    background: rgba(90,122,94,0.12);
    color: var(--sage);
    border-color: rgba(90,122,94,0.25);
  }
  .status-pill.red {
    background: rgba(155,74,46,0.1);
    color: var(--rust);
    border-color: rgba(155,74,46,0.2);
  }
  .status-pill.amber {
    background: rgba(232,200,74,0.2);
    color: #7a5800;
    border-color: rgba(232,200,74,0.5);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.green { background: var(--sage); }
  .status-dot.red { background: var(--rust); }
  .status-dot.amber { background: #d4a843; }

  /* Not found */
  .not-found {
    text-align: center;
    padding: 48px 24px;
    background: #fff;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
  }
  .not-found-icon {
    font-size: 36px;
    margin-bottom: 14px;
    opacity: 0.5;
  }
  .not-found h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .not-found p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Tip box */
  .tip-box {
    max-width: 520px;
    margin: 24px auto 0;
    padding: 0 20px;
  }
  .tip-inner {
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* Initial state */
  .initial-message {
    text-align: center;
    padding: 48px 0;
  }
  .initial-icon {
    font-size: 48px;
    margin-bottom: 14px;
    opacity: 0.25;
  }
  .initial-text {
    font-size: 14px;
    color: var(--muted);
  }

  /* Google Sheets connect banner */
  .sheets-banner {
    max-width: 520px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: none;
  }
  .sheets-banner.show { display: block; }
  .sheets-inner {
    background: #e8f0fe;
    border: 1px solid #aecbfa;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 12px;
    color: #174ea6;
    line-height: 1.7;
  }
  .sheets-inner a {
    color: #1a73e8;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    max-width: 520px;
    margin: 40px auto 0;
    padding: 0 20px;
    text-align: center;
    font-size: 11px;
    color: var(--border);
    letter-spacing: 1px;
  }

  @media (max-width: 400px) {
    .search-row { flex-direction: column; }
    .search-btn { padding: 13px; }
  }
</style>
</head>

// ===== Google Sheets 即時讀取 =====
async function fetchFromSheets() {
  // Apps Script API — 直接從試算表即時讀取
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      mode: 'cors',
      credentials: 'omit'  // 不帶任何帳號 cookie，避免組織帳號干擾
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const db = await res.json();
    return db;
  } catch(e) {
    console.error('Apps Script fetch failed:', e);
    return null;
  }
}

function parseCSVData(csvText) {
  function parseCSVLine(line) {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        result.push(cur.trim()); cur = '';
      } else cur += ch;
    }
    result.push(cur.trim());
    return result;
  }

  const lines = csvText.split('\n').filter(l => l.trim());
  const db = {};

  const courses = [
    {name:'走訪童年', date:'1/10(六)-1/11(日)', cols:[0,1,2]},
    {name:'中年再出發', date:'1/31(六)-2/1(日)', cols:[4,5,6]},
    {name:'走訪童年', date:'4/18(六)-4/19(日)', cols:[8,9,10]},
    {name:'九型人格', date:'5/2(六)-5/3(日)', cols:[11,12,13]},
    {name:'走訪童年', date:'5/9(六)-5/10(日)', cols:[14,15,16]},
    {name:'中年再出發', date:'5/30(六)-5/31(日)', cols:[17,18,19]},
    {name:'九型整合', date:'6/13(六)-6/14(日)', cols:[20,21,22]},
  ];

  // 跳過前兩行標題
  for (let i = 2; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);
    for (const c of courses) {
      const [si, ni, gi] = c.cols;
      const seq = (row[si] || '').trim();
      const name = (row[ni] || '').trim();
      const joined = (row[gi] || '').trim();
      if (!name || name === '#N/A' || !seq) continue;
      if (!db[name]) db[name] = [];
      db[name].push({
        courseName: c.name,
        date: c.date,
        seq: seq,
        isWaitlist: seq.includes('候補'),
        joined: joined === 'TRUE' || joined === '是' || joined === 'true'
      });
    }
  }
  return db;
}

let currentDB = STATIC_DB;
let dataLoaded = false;

async function initData() {
  if (USE_GOOGLE_SHEETS) {
    document.getElementById('sourceText').textContent = '正在連接 Google Sheets…';
    const liveDB = await fetchFromSheets();
    if (liveDB) {
      currentDB = liveDB;
      document.getElementById('sourceText').textContent = '即時連結 Google Sheets ✓';
    } else {
      document.getElementById('sourceText').textContent = '已使用本機資料（無法連接試算表）';
    }
  }
  dataLoaded = true;
}

function doSearch() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    document.getElementById('nameInput').focus();
    return;
  }

  // Fuzzy match: exact first, then partial
  let entries = currentDB[name];
  let matchedName = name;

  if (!entries) {
    // Try partial match
    const keys = Object.keys(currentDB);
    const partial = keys.find(k => k.includes(name) || name.includes(k));
    if (partial) {
      entries = currentDB[partial];
      matchedName = partial;
    }
  }

  renderResults(name, matchedName, entries);
}

function renderResults(searchName, matchedName, entries) {
  const el = document.getElementById('results');

  if (!entries || entries.length === 0) {
    el.innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">🔎</div>
        <h3>查無「${searchName}」的報名資料</h3>
        <p>請確認姓名是否與報名時填寫的完全一致<br>若有疑問，請聯繫課務同工確認</p>
      </div>
    `;
    return;
  }

  const confirmedCount = entries.filter(e => !e.isWaitlist).length;
  const waitlistCount = entries.filter(e => e.isWaitlist).length;

  let metaText = `共報名 ${confirmedCount} 堂正式課程`;
  if (waitlistCount > 0) metaText += `，${waitlistCount} 堂候補中`;

  let html = `
    <div class="person-header">
      <div class="person-avatar">${matchedName.charAt(0)}</div>
      <div class="person-name-block">
        <div class="person-name">${matchedName}</div>
        <div class="person-meta">${metaText}</div>
      </div>
    </div>
  `;

  for (const e of entries) {
    const cardClass = e.isWaitlist ? 'waitlist' : 'confirmed';
    const seqClass = e.isWaitlist ? 'waitlist' : 'normal';
    const seqLabel = e.isWaitlist ? e.seq : `第 ${e.seq} 位`;

    const joinedPill = e.joined
      ? `<span class="status-pill green"><span class="status-dot green"></span>已入群</span>`
      : `<span class="status-pill red"><span class="status-dot red"></span>尚未入群</span>`;

    const statusPill = e.isWaitlist
      ? `<span class="status-pill amber"><span class="status-dot amber"></span>候補中，等待遞補</span>`
      : `<span class="status-pill green"><span class="status-dot green"></span>報名成功</span>`;

    html += `
      <div class="course-card ${cardClass}">
        <div class="card-top">
          <div class="course-title-block">
            <div class="course-type">上半年課程</div>
            <div class="course-name">${e.courseName}</div>
          </div>
          <span class="seq-badge ${seqClass}">${seqLabel}</span>
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v3M11 1v3M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          ${e.date}
        </div>
        <div class="card-divider"></div>
        <div class="card-status-row">
          ${statusPill}
          ${joinedPill}
        </div>
      </div>
    `;
  }

  el.innerHTML = html;
}

// Enter key support
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// Init
initData();
</script>
</body>
</html>
